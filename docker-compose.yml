# WebTestPro 自动化测试平台 - 基础设施 Docker Compose
# 版本：Phase 0 基础设施（不含业务服务，业务服务在 Phase 2 加入）
# 启动命令：docker-compose --env-file .env up -d

version: '3.8'

networks:
  wtp-net:
    driver: bridge

volumes:
  mysql-data:
  redis-cache-data:
  redis-queue-data:
  redis-lock-data:
  minio-data:
  prometheus-data:
  grafana-data:
  skywalking-data:
  vault-data:

services:

  # ============================================================
  # MySQL 8
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: wtp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: web_test_pro
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --innodb-buffer-pool-size=512M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ============================================================
  # Redis - 三实例隔离
  # DB0 (redis-cache):  access_token / 热缓存  allkeys-lru
  # DB1 (redis-queue):  执行队列               noeviction + AOF
  # DB2 (redis-lock):   分布式锁 + 信号量 + refresh_token  noeviction
  # ============================================================
  redis-cache:
    image: redis:7.2-alpine
    container_name: wtp-redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-cache-data:/data
      - ./docker/redis/redis-cache.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 256M

  redis-queue:
    image: redis:7.2-alpine
    container_name: wtp-redis-queue
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-queue-data:/data
      - ./docker/redis/redis-queue.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 512M

  redis-lock:
    image: redis:7.2-alpine
    container_name: wtp-redis-lock
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis-lock-data:/data
      - ./docker/redis/redis-lock.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # MinIO 对象存储（截图 / HAR / HTML / 报告）
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: wtp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console（仅内部访问）
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================
  # HashiCorp Vault（dev 模式，Phase 0 密钥管理）
  # ⚠️ dev 模式数据不持久化，生产环境须切换为 server 模式
  # ============================================================
  vault:
    image: hashicorp/vault:1.15
    container_name: wtp-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./docker/vault/init-secrets.sh:/docker-entrypoint-initdb.d/init-secrets.sh:ro
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wtp-net

  # ============================================================
  # Selenoid 容器化浏览器（UI 测试执行节点）
  # 需提前执行：cm selenoid configure --browsers chrome
  # ============================================================
  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: wtp-selenoid
    restart: unless-stopped
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/selenoid:/etc/selenoid:ro
      - /tmp/selenoid:/tmp/selenoid
    environment:
      TZ: Asia/Shanghai
    command: >
      -conf /etc/selenoid/browsers.json
      -video-output-dir /tmp/selenoid/video
      -log-output-dir /tmp/selenoid/logs
      -limit ${SELENOID_MAX_SESSIONS:-5}
      -timeout 5m
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'

  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: wtp-selenoid-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    command: --selenoid-uri http://selenoid:4444
    depends_on:
      - selenoid
    networks:
      - wtp-net

  # ============================================================
  # XXL-JOB 分布式任务调度（单节点开发模式）
  # ============================================================
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: wtp-xxl-job
    restart: unless-stopped
    environment:
      PARAMS: >
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=${MYSQL_USER}
        --spring.datasource.password=${MYSQL_PASSWORD}
        --xxl.job.accessToken=${XXL_JOB_TOKEN}
        --spring.mail.host=${MAIL_HOST:-smtp.example.com}
        --server.port=8080
      TZ: Asia/Shanghai
    ports:
      - "8089:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wtp-net

  # ============================================================
  # SkyWalking 链路追踪（OAP + UI）
  # ============================================================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.6.0
    container_name: wtp-skywalking-oap
    restart: unless-stopped
    environment:
      SW_STORAGE: h2
      SW_STORAGE_H2_URL: jdbc:h2:mem:skywalking-oap-db
      TZ: Asia/Shanghai
    ports:
      - "11800:11800"   # gRPC（Agent 上报）
      - "12800:12800"   # HTTP（UI 查询）
    volumes:
      - skywalking-data:/opt/skywalking/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12800/internal/l7check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wtp-net

  skywalking-ui:
    image: apache/skywalking-ui:9.6.0
    container_name: wtp-skywalking-ui
    restart: unless-stopped
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      TZ: Asia/Shanghai
    ports:
      - "8091:8080"
    depends_on:
      - skywalking-oap
    networks:
      - wtp-net

  # ============================================================
  # Prometheus + Grafana 指标监控
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: wtp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - wtp-net

  grafana:
    image: grafana/grafana:latest
    container_name: wtp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - wtp-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Allure 报告服务
  # ============================================================
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: wtp-allure
    restart: unless-stopped
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 3
      KEEP_HISTORY: 1
      TZ: Asia/Shanghai
    ports:
      - "5050:5050"
    volumes:
      - /tmp/allure/results:/app/allure-results
      - /tmp/allure/reports:/app/default-reports
    networks:
      - wtp-net
