# redis-cache.conf
# 用途：DB0 - access_token / 热缓存
# 淘汰策略：allkeys-lru（内存满时驱逐最久未使用的 key）
# 持久化：RDB 可选（缓存丢失可接受）

bind 0.0.0.0
port 6379
protected-mode no

# 最大内存 256MB，超出时执行 LRU 淘汰
maxmemory 256mb
maxmemory-policy allkeys-lru

# RDB 持久化（可接受丢失，仅做基础保护）
save 3600 1
save 300 100
save 60 10000
rdbcompression yes
dbfilename dump-cache.rdb
dir /data

# 不开启 AOF（缓存数据丢失可接受）
appendonly no

# 连接超时（秒）
timeout 300
tcp-keepalive 60

# 慢查询日志（超过 10ms 记录）
slowlog-log-slower-than 10000
slowlog-max-len 128

# 最大客户端连接数
maxclients 1000

loglevel notice
