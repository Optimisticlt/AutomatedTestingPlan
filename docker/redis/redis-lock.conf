# redis-lock.conf
# 用途：DB2 - 分布式锁 + Selenoid 信号量 + refresh_token
# 淘汰策略：noeviction（锁和 refresh_token 绝不被 LRU 驱逐）
# 持久化：AOF 推荐（锁 TTL 短，重启后自动过期，可接受 RDB）

bind 0.0.0.0
port 6379
protected-mode no

# noeviction：内存不足时报错，而非驱逐数据
maxmemory 256mb
maxmemory-policy noeviction

# AOF 持久化（refresh_token 不可丢失，7 天有效期）
appendonly yes
appendfilename "appendonly-lock.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb
aof-use-rdb-preamble yes
dir /data

# RDB 补充保障
save 900 1
save 300 10
dbfilename dump-lock.rdb

timeout 300
tcp-keepalive 60
maxclients 500

slowlog-log-slower-than 10000
slowlog-max-len 128

loglevel notice
