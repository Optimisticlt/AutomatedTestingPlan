# redis-queue.conf
# 用途：DB1 - 执行队列（BRPOP/RPUSH）
# 淘汰策略：noeviction（禁止驱逐，队列任务绝不丢失）
# 持久化：必须开启 AOF，防止重启后丢失待执行任务
# ⚠️  ADR NH3：生产环境须配置 min-replicas-to-write 1

bind 0.0.0.0
port 6379
protected-mode no

# 不限制内存大小（noeviction，内存满时报错而非驱逐）
maxmemory 512mb
maxmemory-policy noeviction

# ============================================================
# AOF 持久化（强制开启，防止队列任务在重启后丢失）
# appendfsync everysec：每秒 fsync，兼顾性能与安全
# ============================================================
appendonly yes
appendfilename "appendonly-queue.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes
dir /data

# RDB 保持开启作为 AOF 补充保障
save 900 1
save 300 10
dbfilename dump-queue.rdb

# ⚠️  生产 Sentinel 模式须在主库 redis.conf 追加：
# min-replicas-to-write 1
# min-replicas-max-lag 10

timeout 300
tcp-keepalive 60
maxclients 500

slowlog-log-slower-than 10000
slowlog-max-len 128

loglevel notice
